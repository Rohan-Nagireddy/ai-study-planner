# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://ai-study-planner-9mkx.onrender.com/login/oauth2/code/google

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=https://ai-study-planner-9mkx.onrender.com/login/oauth2/code/github

# Debug Logging for OAuth Troubleshooting
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Application URL Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://effervescent-madeleine-f7e9c1.netlify.app}
