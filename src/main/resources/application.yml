spring:
  application:
    name: ai-study-planner

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false

  # OAuth2 Login configuration has been moved to application.properties
    user:
      password: "disabled"

# Render injects PORT automatically; fallback to 8080 for local dev
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

# Application Configuration
app:
  # JWT
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # Groq AI Integration
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    model: llama3-8b-8192
    max-tokens: 2048
    temperature: 0.7
    timeout-seconds: 30

# Logging — less verbose in production
logging:
  level:
    com.studyplanner: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.mongodb: WARN
    org.mongodb.driver.connection: WARN
    org.mongodb.driver.cluster: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
