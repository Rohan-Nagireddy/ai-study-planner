spring:
  application:
    name: ai-study-planner

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: false

  # OAuth2 Login (Google & GitHub)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/github"
            scope:
              - read:user
              - user:email
    user:
      password: "disabled"

# Render injects PORT automatically; fallback to 8080 for local dev
server:
  port: ${PORT:8080}

# Application Configuration
app:
  # JWT
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXZlcnlzZWN1cmVpbnRlcm5hbGp3dHNlY3JldGtleTIwMjYwMzIw}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # Groq AI Integration
  groq:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1
    model: llama3-8b-8192
    max-tokens: 2048
    temperature: 0.7
    timeout-seconds: 30

# Logging — less verbose in production
logging:
  level:
    com.studyplanner: INFO
    org.springframework.security: WARN
    org.springframework.security.oauth2: WARN
    org.springframework.data.mongodb: WARN
    org.mongodb.driver.connection: WARN
    org.mongodb.driver.cluster: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
